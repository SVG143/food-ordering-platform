services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["foodhub_data:/data/db"]
  api:
    build: ./apps/api
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/foodhub
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your environment or .env file}
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    ports: ["5000:5000"]
    depends_on: [mongo]
  web:
    build: ./apps/web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports: ["5173:80"]
    depends_on: [api]
volumes:
  foodhub_data:
